services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: qdrant
    ports:
      - 6333:6333
    expose:
      - 6333
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - /mnt/sda2/containers/qdrant:/qdrant/storage:z

configs:
  qdrant_config:
    content: |
      log_level: INFO
